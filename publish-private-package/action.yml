name: Publish Private Package
description: Publishes an npm package to GitHub Packages (@botpress scope)

inputs:
  package-dir:
    description: Package's directory
    required: true
    default: './'
  token:
    description: GitHub token for authentication (usually secrets.GITHUB_TOKEN)
    required: true

runs:
  using: 'composite'
  steps:
    - name: Check if version already exists
      id: check
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: |
        PACKAGE_NAME=$(node -p "require('./package.json').name")
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
        echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
        # Configure auth temporarily just for the npm view check
        echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> ~/.npmrc
        if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com 2>/dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skipping."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}

    - name: Publish to GitHub Packages
      if: steps.check.outputs.exists == 'false'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: pnpm publish --no-git-checks
      env:
        NODE_AUTH_TOKEN: ${{ inputs.token }}

    - name: Summary
      shell: bash
      if: always()
      env:
        EXISTS: ${{ steps.check.outputs.exists }}
        PACKAGE_NAME: ${{ steps.check.outputs.name }}
        PACKAGE_VERSION: ${{ steps.check.outputs.version }}
      run: |
        if [[ "$EXISTS" == "true" ]]; then
          echo "### ${PACKAGE_NAME}@${PACKAGE_VERSION} — already published" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "### ${PACKAGE_NAME}@${PACKAGE_VERSION} — published" >> "$GITHUB_STEP_SUMMARY"
        fi
