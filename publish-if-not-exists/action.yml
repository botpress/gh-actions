name: Publish If Not Exists
description: Publishes a local package if it doesn't already exist on NPM Registry

inputs:
  path:
    description: Path to the package to publish
    required: true

  token:
    description: NPM access token. Omit to use OIDC login (Trusted Publisher)
    required: false
    default: ''

  package_manager:
    description: Package manager to use for publishing. Can be 'npm' or 'pnpm'
    required: false
    default: 'npm'

runs:
  using: 'composite'
  steps:
    - name: Install JQ
      shell: bash
      run: sudo apt-get install jq

    - name: '[OIDC] Setup Node and registry'
      if: inputs.token == ''
      uses: actions/setup-node@v6
      with:
        node-version: '^22.9.0'
        registry-url: 'https://registry.npmjs.org'

    - name: '[OIDC] Ensure NPM 11.5.1+'
      if: inputs.token == ''
      shell: bash
      run: |
        current_npm=$(npm --version)
        required="11.5.1"
        if [ "$(printf '%s\n' "$required" "$current_npm" | sort -V | head -n1)" = "$required" ]; then
          echo "npm $current_npm is already >= $required"
        else
          echo "npm $current_npm is below $required, upgrading via corepack"
          corepack enable
          corepack install -g npm@$required
        fi

    - name: '[API Token] Login'
      if: inputs.token != ''
      shell: bash
      run: |
        echo "//registry.npmjs.org/:_authToken=${{ inputs.token }}" > ~/.npmrc

    - name: Publish
      shell: bash
      run: |
        file_content=$(cat "${{ inputs.path }}/package.json")

        name=$(echo "$file_content" | jq -r ".name")
        version=$(echo "$file_content" | jq -r ".version")

        echo "name: $name"
        echo "version: $version"

        package_ref="$name@$version"

        package_manager="${{ inputs.package_manager }}"
        if [[ "$package_manager" != "pnpm" && "$package_manager" != "npm" ]]; then
          echo "Unsupported package manager: $package_manager"
          exit 1
        fi

        if npm view "$package_ref" > /dev/null 2>&1 ; then
          echo "Package $package_ref already published"
          exit 0
        fi


        echo "=== Debug: npm config ==="
        npm config list
        echo "=== Debug: .npmrc files ==="
        cat "$GITHUB_WORKSPACE/.npmrc" 2>/dev/null || echo "No .npmrc at workspace root"
        cat "${{ inputs.path }}/.npmrc" 2>/dev/null || echo "No .npmrc in package dir"
        echo "=== Debug: NODE_AUTH_TOKEN set? ==="
        [ -n "$NODE_AUTH_TOKEN" ] && echo "NODE_AUTH_TOKEN is set" || echo "NODE_AUTH_TOKEN is NOT set"
        echo "=========================="

        echo "Publishing version $package_ref"
        echo "Using $package_manager as package manager"

        cd "${{ inputs.path }}" || exit 1
        cmd="$package_manager publish --access public --provenance"

        if [ "$package_manager" = "pnpm" ]; then
          cmd="$cmd --publish-branch ${{ github.ref_name }}"
        fi

        eval "$cmd"
